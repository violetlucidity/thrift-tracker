<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thrift Tracker</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Thrift Tracker</h1>
    <div class="header-actions">
      <button class="btn-secondary" onclick="fetchListings()">Refresh</button>
      <button class="btn-primary" onclick="runScrape()">Run Scrape Now</button>
    </div>
  </header>

  <div id="status-bar">Loading status…</div>

  <div id="filter-bar">
    <input  id="f-keyword"   type="search"  placeholder="Search titles &amp; descriptions…" />
    <select id="f-label"     multiple><option value="">All searches</option></select>
    <select id="f-size"      multiple><option value="">All sizes</option></select>
    <select id="f-brand"     multiple><option value="">All brands</option></select>
    <select id="f-condition" multiple><option value="">All conditions</option></select>
    <input  id="f-price-max" type="number"  placeholder="Max price" min="0" step="0.01" />
    <button class="btn-secondary" id="btn-clear-filters">Clear</button>
    <span   id="filter-count"></span>
  </div>
  <div id="site-tabs" hidden></div>

  <div id="popup-warning" hidden>
    <span>Allow popups for localhost to open multiple tabs at once.</span>
    <button class="close-btn" id="btn-close-warning">&times;</button>
  </div>

  <main id="listings-container"></main>

  <div id="empty-state" hidden>No new listings. Run a scrape to check for updates.</div>

  <footer id="action-bar">
    <span id="selected-count">0 selected</span>
    <div>
      <button class="btn-secondary" id="btn-open" disabled onclick="openSelected()">Open Selected</button>
      <button class="btn-primary" id="btn-reviewed" disabled onclick="markReviewed()">Mark Reviewed</button>
    </div>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
