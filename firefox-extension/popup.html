<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }

    header {
      background: #2d6a4f;
      color: #fff;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header img { width: 22px; height: 22px; }

    header h1 { font-size: 15px; font-weight: 600; }

    .body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

    .url-box {
      background: #f0f4f2;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 11px;
      color: #444;
      word-break: break-all;
      max-height: 56px;
      overflow: hidden;
    }

    .site-tag {
      font-size: 12px;
      font-weight: 600;
      color: #2d6a4f;
    }

    .site-tag.unknown { color: #999; font-weight: 400; }

    button {
      width: 100%;
      padding: 9px;
      background: #2d6a4f;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #245a41; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #status {
      font-size: 12px;
      min-height: 18px;
      text-align: center;
    }

    #status.ok  { color: #2d6a4f; }
    #status.err { color: #e63946; }

    .hint {
      font-size: 11px;
      color: #888;
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <header>
    <img src="icons/thrift.svg" alt="" />
    <h1>Thrift Tracker</h1>
  </header>

  <div class="body">
    <div class="url-box" id="url-display">Loading…</div>
    <div class="site-tag" id="site-display"></div>
    <button id="save-btn" disabled>Save to thrift-links.txt</button>
    <div id="status"></div>
    <p class="hint" id="hint" hidden>
      Run <code>python import_links.py thrift-links.txt</code> to push saved links into config.json.
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
